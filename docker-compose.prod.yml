services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toil-projetos-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    volumes:
      # Volume persistente para uploads
      - toil-uploads:/app/public/uploads
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: toil-projetos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - toil-mysql-data:/var/lib/mysql

volumes:
  toil-uploads:
    driver: local
  toil-mysql-data:
    driver: local
